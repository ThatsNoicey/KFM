<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/static/logofavicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #87CEEB, #228B22); /* Sky to ground gradient */
            font-family: 'Segoe UI', system-ui;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #gameCanvas {
            border: 2px solid #6E4C1E; 
            background: #8B6C42;
            width: 100%;
            height: 100%;
        }

        #angle-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(8, 32, 58, 0.9);
            border: 2px solid #1a3a5a;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 16px;
            font-family: 'Segoe UI', system-ui;
            text-align: center;
            z-index: 1000;
        }

        #return-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            z-index: 1000;
        }

        #return-btn:hover {
            background: #005f8a;
        }

        /* Opening Screen Styles */
        #opening-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.95); /* Semi-transparent dark background */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #opening-box {
            background: #1a3a5a; /* Dark blue box */
            border: 2px solid #2e4a6b;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: white;
            max-width: 600px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #opening-box h1 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        #opening-box p {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        #start-btn {
            padding: 10px 20px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        #start-btn:hover {
            background: #005f8a;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="angle-indicator">Angle: 0°</div>
    <button id="return-btn" onclick="returnToMain()">Return to Main</button>

    <div id="opening-screen" style="display: flex;">
        <div id="opening-box">
            <h1>Welcome to the 🏎️ Car Driving Game</h1>
            <p>
                Use your knee flexion angle to control the car's position and navigate the road. 
                Keep the car on the road to stay on track. 
                Avoid obstacles and stay focused as the road changes dynamically!
            </p>
            <button id="start-btn" onclick="closeOpeningScreen()">Start Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game variables
        let currentAngle = 0; // Current angle of the ankle
        let carY = canvas.height / 2; // Initial vertical position of the car
        let carTilt = 0; // Tilt of the car
        let roadOffset = 0; // Offset for the moving road
        let roadTargetY = canvas.height * 0.2; // Initial road position (5 degrees)
        let roadTransitionStart = null; // Start time for road transition
        let roadTilt = 0; // Initial tilt of the road
        let showWarning = false;

        // Road properties
        const roadSpeed = 2; // Speed of the road movement
        const roadHeight = 40; // Height of the road
        const roadWidth = canvas.width * 2; // Double the width of the canvas

        // Car properties
        const carWidth = 50;
        const carHeight = 70;
        const carImg = new Image();
        let carImgLoaded = false;

        carImg.onload = () => {
            carImgLoaded = true;
        };
        carImg.onerror = () => {
            console.error("Failed to load car image. Using fallback.");
        };
        carImg.src = '/static/car.png'; // Load car image from static folder

        // Tree properties
        const treeCount = 20; // Number of trees to draw
        const trees = []; // Array to store tree positions

        // Generate random tree positions
        function generateTrees() {
            for (let i = 0; i < treeCount; i++) {
                const x = Math.random() * canvas.width; // Random x position
                const y = Math.random() * canvas.height; // Random y position

                // Ensure trees are not placed in the road area
                if (y < canvas.height * 0.2 || y > canvas.height * 0.7) {
                    trees.push({ x, y });
                } else {
                    i--; // Retry if the tree is in the road area
                }
            }
        }
        // Return to main page function
        function returnToMain() {
            sessionStorage.setItem('skipOpeningScreen', 'true'); // Save a flag to skip the opening screen
            window.location.href = '/'; // Navigate to the main page
        }

        // Draw trees
        function drawTrees() {
            trees.forEach(tree => {
                // Adjust tree position based on road tilt
                const adjustedX = tree.x;
                const adjustedY = tree.y - roadTargetY;

                // Check if the tree is outside the road area
                const roadTop = roadTargetY - roadHeight / 2;
                const roadBottom = roadTargetY + roadHeight / 2;

                if (adjustedY < roadTop || adjustedY > roadBottom) {
                    // Draw trunk
                    ctx.fillStyle = '#8B4513'; // Brown color for the trunk
                    ctx.fillRect(adjustedX - 5, adjustedY, 10, 30); // Trunk width: 10px, height: 30px

                    // Draw foliage
                    ctx.fillStyle = '#228B22'; // Green color for the foliage
                    ctx.beginPath();
                    ctx.arc(adjustedX, adjustedY, 15, 0, Math.PI * 2); // Foliage radius: 15px
                    ctx.fill();
                }
            });
        }

        // Generate tree positions once
        generateTrees();

        // Draw the road
        function drawRoad() {
            const elapsed = performance.now() - roadTransitionStart;

            // Determine the current phase of the oscillation
            const totalCycleTime = 25000; // 5s at 5 degrees + 10s at 90 degrees + 2s transitions
            const phaseTime = elapsed % totalCycleTime;

            function easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            if (phaseTime <= 5000) {
                // Phase 1: Hold at 5 degrees for 5 seconds
                roadTargetY = canvas.height * 0.1; // 5 degrees position
                roadTilt = 0; // No tilt
            } else if (phaseTime > 5000 && phaseTime <= 7000) {
                // Phase 2: Transition to 90 degrees (2 seconds)
                const progress = easeInOutCubic((phaseTime - 5000) / 2000);
                roadTargetY = canvas.height * 0.1 + (canvas.height * 0.7 - canvas.height * 0.1) * progress; // Smooth transition
                roadTilt = progress * 15; // Simulate downward tilt
            } else if (phaseTime > 7000 && phaseTime <= 17000) {
                // Phase 3: Hold at 90 degrees for 10 seconds
                roadTargetY = canvas.height * 0.7; // 90 degrees position
                roadTilt = 0; // Gradually return to flat
            } else if (phaseTime > 17000 && phaseTime <= 19000) {
                // Phase 4: Transition back to 5 degrees (2 seconds)
                const progress = (phaseTime - 17000) / 2000; // Progress of the transition (0 to 1)
                roadTargetY = canvas.height * 0.7 - (canvas.height * 0.7 - canvas.height * 0.1) * progress; // Smooth transition
                roadTilt = -progress * 15; // Simulate upward tilt
            } else if (phaseTime > 19000 && phaseTime <= 25000) {
                // Phase 5: Gradually return to flat after transition
                const progress = (phaseTime - 19000) / 6000; // Progress of the return to flat (0 to 1)
                roadTargetY = canvas.height * 0.1; // Back to 5 degrees position
                roadTilt = (1 - progress) * -15; // Gradually reduce tilt to 0
            }

            // Trigger warning 2 seconds before the road changes
            if (phaseTime >= 3000 && phaseTime <= 5000) {
                showWarning = true;
            } else {
                showWarning = false;
            }

            // Draw the road with tilt
            ctx.save();
            ctx.translate(0, roadTargetY);
            ctx.rotate((roadTilt * Math.PI) / 180); // Apply tilt in radians
            ctx.fillStyle = '#444'; // Dark gray for the road
            ctx.fillRect(0, 0, roadWidth, roadHeight);

            // Draw lane markings
            ctx.fillStyle = '#FFF'; // White for lane markings
            for (let i = -roadHeight; i < roadWidth; i += 100) {
                ctx.fillRect(i + roadOffset, roadHeight / 2 - 5, 50, 10);
            }
            ctx.restore();

            // Update road offset
            roadOffset -= roadSpeed;
            if (roadOffset <= -100) {
                roadOffset = 0;
            }
        }

        // Draw the car
        function drawCar() {
            const carX = canvas.width * 0.2; // Car is positioned on the left side
            carY = (currentAngle / 135) * canvas.height; // Map angle to vertical position
            carTilt = (currentAngle - 80) / 20; // Tilt based on angle deviation from 80-100

            ctx.save();
            ctx.translate(carX, carY);
            ctx.rotate(carTilt * 0.1); // Rotate the car based on tilt

            if (carImgLoaded) {
                ctx.drawImage(carImg, -carWidth / 2, -carHeight / 2, carWidth, carHeight);
            } else {
                ctx.fillStyle = '#ff0000'; // Fallback red rectangle
                ctx.fillRect(-carWidth / 2, -carHeight / 2, carWidth, carHeight);
            }

            ctx.restore();
        }

        // Mini-map properties
        const miniMapWidth = 200;
        const miniMapHeight = 50;
        const miniMapPadding = 20;

        const courseImg = new Image();
        courseImg.src = '/static/course.png'; // Path to your course image

        // Draw the mini-map
        function drawMiniMap() {
            const totalCycleTime = 25000; // Total time for one road cycle
            const progress = (performance.now() - roadTransitionStart) % totalCycleTime / totalCycleTime;

            // Draw mini-map background image
            if (courseImg.complete) {
                ctx.drawImage(courseImg, miniMapPadding, miniMapPadding, miniMapWidth, miniMapHeight);
            } else {
                // Fallback: Draw a solid background if the image is not loaded
                ctx.fillStyle = '#444';
                ctx.fillRect(miniMapPadding, miniMapPadding, miniMapWidth, miniMapHeight);
            }

            // Draw car position on the mini-map
            ctx.fillStyle = '#ff0000';
            const lineWidth = 10; 
            ctx.fillRect(
                miniMapPadding + miniMapWidth * progress - lineWidth / 2,
                miniMapPadding,
                lineWidth,
                miniMapHeight
            );
        }

        // Draw the "Road Changing" message
        function drawWarning() {
            if (showWarning) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Road Changing!', canvas.width / 2, canvas.height - 50); // Display at the bottom
            }
        }

        // Countdown timer properties
        let countdownTime = 5; // Initial countdown time in seconds

        // Draw the countdown timer
        function drawCountdown() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'white';
            ctx.fillText(`Time Left: ${Math.ceil(countdownTime)}s`, 100, canvas.height / 2); // Middle-left position
        }

        // Update the countdown timer
        function updateCountdown() {
            const totalCycleTime = 25000; // Total time for one road cycle
            const phaseTime = (performance.now() - roadTransitionStart) % totalCycleTime;

            if (phaseTime <= 5000) {
                countdownTime = (5000 - phaseTime) / 1000; // Countdown for Phase 1
            } else if (phaseTime > 5000 && phaseTime <= 7000) {
                countdownTime = (7000 - phaseTime) / 1000; // Countdown for Phase 2
            } else if (phaseTime > 7000 && phaseTime <= 17000) {
                countdownTime = (17000 - phaseTime) / 1000; // Countdown for Phase 3
            } else if (phaseTime > 17000 && phaseTime <= 19000) {
                countdownTime = (19000 - phaseTime) / 1000; // Countdown for Phase 4
            } else if (phaseTime > 19000 && phaseTime <= 25000) {
                countdownTime = (25000 - phaseTime) / 1000; // Countdown for Phase 5
            }
        }

        // Trigger warning for all transitions
        function updateWarning() {
            const totalCycleTime = 25000; // Total time for one road cycle
            const phaseTime = (performance.now() - roadTransitionStart) % totalCycleTime;

            // Show warning 2 seconds before each transition
            if (
                (phaseTime >= 3000 && phaseTime <= 5000) || // Before Phase 2
                (phaseTime >= 15000 && phaseTime <= 17000) || // Before Phase 4
                (phaseTime >= 23000 && phaseTime <= 25000) // Before Phase 1 restart
            ) {
                showWarning = true;
            } else {
                showWarning = false;
            }
        }

        // Update the angle indicator
        function updateAngleIndicator() {
            const angleIndicator = document.getElementById('angle-indicator');
            angleIndicator.textContent = `Angle: ${Math.round(currentAngle)}°`;

            // Highlight the indicator if the angle is in the target range
            if (currentAngle >= 80 && currentAngle <= 100) {
                angleIndicator.style.background = '#2a5d2a';
                angleIndicator.style.borderColor = '#77ff77';
            } else {
                angleIndicator.style.background = 'rgba(8, 32, 58, 0.9)';
                angleIndicator.style.borderColor = '#1a3a5a';
            }
        }

        // Load the background map PNG
        const backgroundImg = new Image();
        backgroundImg.src = '/static/map.png'; // Replace with the path to your PNG file
        let backgroundOffset = 0; // Horizontal offset for scrolling the background

        backgroundImg.onload = () => {
            console.log("Background image loaded successfully.");
        };

        backgroundImg.onerror = () => {
            console.error("Failed to load background image.");
        };

        // Draw the scrolling background
        function drawBackground() {
            const imgHeight = canvas.height; // Set the image height to match the canvas height
            const imgWidth = (backgroundImg.width / backgroundImg.height) * imgHeight; // Calculate width proportionally

            // Draw the image twice to create a seamless scrolling effect
            ctx.drawImage(backgroundImg, backgroundOffset, 0, imgWidth, imgHeight);
            ctx.drawImage(backgroundImg, backgroundOffset + imgWidth, 0, imgWidth, imgHeight);

            // Update the background offset
            backgroundOffset -= roadSpeed; // Move the background to the left
            if (backgroundOffset <= -imgWidth) {
                backgroundOffset = 0; // Reset the offset when the image scrolls completely
            }
        }

        // Game loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground(); // Draw the scrolling background
            drawCar(); // Draw the car
            drawMiniMap(); // Draw the mini-map
            updateAngleIndicator(); // Update the angle indicator

            requestAnimationFrame(gameLoop);
        }

        // Fetch angle data periodically and update currentAngle
        setInterval(async () => {
            const data = await fetch('/game-1/data').then(res => res.json()).catch(console.error);
            if (data && data.current_angle !== undefined) {
                currentAngle = data.current_angle; // Update currentAngle with the fetched value
            }
        }, 100); // Fetch data every 100ms

        // Update the countdown and warning periodically
        setInterval(() => {
            updateCountdown();
            updateWarning();
        }, 100); // Update every 100ms

        // Start the game loop
        gameLoop();

        function closeOpeningScreen() {
            const openingScreen = document.getElementById('opening-screen');
            openingScreen.style.display = 'none';
        }
    </script>
</body>
</html>
