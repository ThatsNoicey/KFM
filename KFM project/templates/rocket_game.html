<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/static/logofavicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket Launch Game</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            padding: 0;
            background: #0a192f;
            font-family: 'Segoe UI', system-ui;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #gameCanvas {
            border: 2px solid #2e4a6b;
            background: #0a192f;
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: auto;
        }

        #hud {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: 1px solid #1a3a5a;
            border: none;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        .progress-bar {
            height: 100px; 
            width: 10px; 
            background: #2a5d2a; /* Turn it green */
            position: absolute;
            padding: 10px;
            border-radius: 5px;
            transition: opacity 0.5s ease; /* Add fade-in/out effect */
            z-index: 1000;
        }

        .progress-bar.hidden {
            opacity: 0; /* Hide the bar */
        }

        .bar-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00FF3C, #00B612);
            transition: height 0.3s ease;
            bottom: 0;
            position: absolute;
        }

        #return-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            z-index: 1000;
        }

        #return-btn:hover {
            background: #005f8a;
        }

        @media (max-width: 768px) {
            #hud {
                width: 90%;
                padding: 5px;
            }

            .progress-bar {
                height: 100px;
                width: 10px;
            }
        }

        .status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(8, 32, 58, 0.9);
            border: 2px solid #1a3a5a;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 16px;
            font-family: 'Segoe UI', system-ui;
            text-align: center;
            z-index: 1000;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .status-indicator.in-range {
            background: #2a5d2a; /* Green background */
            border-color: #77ff77; /* Bright green border */
            color: white;
        }

        .progress-info {
            position: absolute;
            color: white;
            font-size: 14px;
            font-family: 'Segoe UI', system-ui;
            z-index: 1000;
        }

        /* Opening Screen Styles */
        #opening-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.95); /* Semi-transparent dark background */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #opening-box {
            background: #1a3a5a; /* Dark blue box */
            border: 2px solid #2e4a6b;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: white;
            max-width: 600px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #opening-box h1 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        #opening-box p {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        #start-btn {
            padding: 10px 20px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        #start-btn:hover {
            background: #005f8a;
        }

        /* Linear Indicator Styles */
        #linear-indicator {
            position: absolute;
            top: 40px; /* Dropped slightly from the top with padding */
            left: 10px;
            width: 50%; /* 50% of the viewport width */
            height: 40px; /* Increased height to accommodate labels */
            background: #1a3a5a; /* Dark blue background */
            border: 2px solid #2e4a6b;
            border-radius: 10px;
            overflow: hidden;
            z-index: 1000;
        }

        #linear-bar {
            position: relative;
            width: 100%;
            height: 20px; /* Height of the bar */
            margin-bottom: 5px; /* Space for labels */
        }

        #red-marker {
            position: absolute;
            left: calc((30 - 0) / 135 * 100%); /* Position at 30 degrees */
            width: 2px;
            height: 100%;
            background: red;
        }

        #green-marker {
            position: absolute;
            left: calc((80 - 0) / 135 * 100%); /* Start at 80 degrees */
            width: calc((100 - 80) / 135 * 100%); /* Cover 80-100 degrees */
            height: 100%;
            background: green;
            opacity: 0.5;
        }

        #cursor {
            position: absolute;
            top: 0;
            width: 4px;
            height: 100%;
            background: yellow; /* Bright yellow for visibility */
            border-radius: 2px;
            transform: translateX(-50%);
            transition: left 0.1s ease; /* Smooth movement */
        }

        .marker-label {
            position: absolute;
            top: 25px; /* Position below the bar */
            font-size: 12px; /* Small font size */
            color: white;
            text-align: center;
            transform: translateX(-50%);
        }
    </style>
    <style>
    /* Charge Bar Styles */
    .progress-bar {
        height: 100px;
        width: 10px;
        background: #2a5d2a; /* Green background */
        position: absolute;
        border-radius: 5px;
        transition: opacity 0.5s ease; /* Fade-in/out effect */
        z-index: 1000;
    }

    .progress-bar.hidden {
        opacity: 0; /* Hide the bar */
    }

    .bar-fill {
        width: 100%;
        height: 0%; /* Start with no fill */
        background: linear-gradient(to top, #00FF3C, #00B612); /* Green gradient */
        transition: height 0.3s ease; /* Smooth fill animation */
        position: absolute;
        bottom: 0;
    }
</style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <button id="return-btn" onclick="returnToMain()">Return to Main</button>

    <div id="hud">
        <div class="progress-bar">
            <div id="charge-bar" class="bar-fill"></div>
        </div>
        <div id="angle-indicator" class="status-indicator"></div>
    </div>

    <div id="opening-screen" style="display: flex;">
        <div id="opening-box">
            <h1>Welcome to the 🚀 Rocket Launch Game</h1>
            <p>
                Use your knee flexion angle to charge the rocket. Keep the angle within the target range 
                (80° - 100°) to build up the charge. Once fully charged, the rocket will launch! 
                Reset the angle below 30° to restart the game.
            </p>
            <button id="start-btn" onclick="closeOpeningScreen()">Start Game</button>
        </div>
    </div>

    <div id="linear-indicator">
        <div id="linear-bar">
            <div id="red-marker"></div>
            <div id="green-marker"></div>
            <div id="cursor"></div>
            <div class="marker-label" style="left: calc((30 - 0) / 135 * 100%);">30</div>
            <div class="marker-label" style="left: calc((80 - 0) / 135 * 100%);">80</div>
            <div class="marker-label" style="left: calc((100 - 0) / 135 * 100%);">100</div>
        </div>
    </div>

    <script>
        const ROCKET_CONFIG = {
            targetRange: { min: 80, max: 100 }, 
            duration: 10, // Duration to charge the rocket in seconds
            resetAngle: 0 // Angle to reset the rocket
        };
        
        class Star {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.twinkle = Math.random() * 0.5;
            }

            draw() {
                this.ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(Date.now() / 1000) * this.twinkle})`;
                this.ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }
        let stars = [];

        function initializeStars(canvas) {
            stars = Array.from({ length: 200 }, () => new Star(canvas));
        }

        function drawStars() {
            stars.forEach(star => star.draw());
        }

        // ROCKET PHYSICS
        const ROCKET_PHYSICS = {
            launchDuration: 2.5,
            returnDuration: 2.5,
            maxTilt: 25,
            parabolaHeight: 0.6,
            returnThreshold: 30,
            flameColors: ['#FF5400', '#FF8500', '#FFAA00'] 
        };

        // GAME STATE
        let gameState = {
            phase: 1, // 1=prep, 2=launch, 3=return
            chargeLevel: 0, 
            lastValidTime: null,
            launchProgress: 0,
            returnProgress: 0,
            trajectory: [],
            flameParticles: [],
            rocketX: 0,
            rocketY: 0
        };

        // FLAME PARTICLE SYSTEM
        function createFlame() {
            if(gameState.phase !== 2) return;
            
            // Add new flame particles
            gameState.flameParticles.push({
                x: canvas.width/2,
                y: 470,
                size: 10 + Math.random() * 10,
                life: 1,
                speedX: (Math.random() - 0.5) * 3,
                color: ROCKET_PHYSICS.flameColors[Math.floor(Math.random()*3)]
            });

            // Remove old particles
            gameState.flameParticles = gameState.flameParticles.filter(p => p.life > 0);
        }

        // MODIFIED UPDATE FUNCTION
        function updateGameState(currentAngle) {
            if (gameState.phase === 1) {
                const inRange = currentAngle >= ROCKET_CONFIG.targetRange.min && 
                                currentAngle <= ROCKET_CONFIG.targetRange.max;

                if (inRange) {
                    const now = Date.now();
                    if (!gameState.lastValidTime) {
                        gameState.lastValidTime = now; // Initialize the timer
                    }

                    const elapsed = (now - gameState.lastValidTime) / 1000; // Time in seconds since last update
                    gameState.chargeLevel = Math.min(gameState.chargeLevel + elapsed / ROCKET_CONFIG.duration, 1);

                    if (gameState.chargeLevel >= 1) {
                        gameState.chargeLevel = 1; // Cap at 100%
                        triggerLaunchAnimation();
                    }

                    gameState.lastValidTime = now; // Update the timer
                } else {
                    // Reset the timer but keep the charge level
                    gameState.lastValidTime = null;
                }
            }

            // Make the rocket visible again when the angle goes below 30 degrees
            if (currentAngle < 30 && !gameState.rocketVisible) {
                gameState.rocketVisible = true;
                resetGame(); // Reset the game state when the rocket becomes visible again
            }
        }
        // INITIALIZATION
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Immediately draw test pattern
        ctx.fillStyle = 'blue';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            console.log('Canvas test pattern cleared - normal operation starts');
        }, 500);

        // ROCKET IMAGE FALLBACK SYSTEM
        const rocketImg = new Image();
        let rocketReady = false;
        
        rocketImg.onload = () => {
            rocketReady = true;
            console.log('Rocket image loaded successfully');
        };
        rocketImg.onerror = () => {
            console.warn('Rocket image failed to load, using fallback');
            drawRocketFallback();
        };
        rocketImg.src = '/static/rocket.png';

        function returnToMain() {
            sessionStorage.setItem('skipOpeningScreen', 'true'); // Save a flag to skip the opening screen
            window.location.href = '/'; // Navigate to the main page
        }

        // STABLE PLATFORM DRAWING
        function drawPlatform() {
            const platformWidth = canvas.width / 6; // Scale platform width relative to canvas
            const platformHeight = 20;
            const platformX = (canvas.width - platformWidth) / 2;
            const platformY = canvas.height * 0.8; // Position platform near the bottom of the canvas

            // Draw the base of the platform
            ctx.fillStyle = '#4A4A4A'; // Dark gray
            ctx.fillRect(platformX, platformY, platformWidth, platformHeight);

            // Add some details to the platform
            ctx.fillStyle = '#6E6E6E'; // Lighter gray
            for (let i = 0; i < platformWidth; i += 10) {
                ctx.fillRect(platformX + i, platformY, 5, platformHeight); // Vertical lines
            }

            // Draw support beams
            ctx.strokeStyle = '#3A3A3A'; // Darker gray
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(platformX, platformY + platformHeight);
            ctx.lineTo(platformX - 20, platformY + platformHeight + 40);
            ctx.lineTo(platformX + platformWidth + 20, platformY + platformHeight + 40);
            ctx.lineTo(platformX + platformWidth, platformY + platformHeight);
            ctx.closePath();
            ctx.stroke();
            ctx.fillStyle = '#4A4A4A';
            ctx.fill();

            // Add bolts or rivets
            ctx.fillStyle = '#B0BEC5'; // Light gray
            for (let i = 10; i < platformWidth; i += 20) {
                ctx.beginPath();
                ctx.arc(platformX + i, platformY + platformHeight / 2, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // FALLBACK ROCKET DRAWING
        function drawRocketFallback() {
            ctx.fillStyle = 'blue';
            ctx.fillRect(
                canvas.width/2 - 15,  // Center X
                470,                  // Y position (500 - 30)
                30,                   // Width
                60                    // Height
            );
        }


        function triggerLaunchAnimation() {
            gameState.phase = 2;
            const startTime = Date.now();
            const startX = gameState.rocketX; // Start from the current X position
            const startY = gameState.rocketY; // Start from the current Y position

            // Temporarily change the rocket image to the flame version
            const originalRocketSrc = rocketImg.src;
            rocketImg.src = '/static/rocketflame.png';

            function animate() {
                const elapsed = Date.now() - startTime;
                gameState.launchProgress = elapsed / (ROCKET_PHYSICS.launchDuration * 1000);

                // Force final position at end
                if (gameState.launchProgress >= 1) {
                    gameState.launchProgress = 1;

                    // Reset the rocket image back to the original
                    rocketImg.src = originalRocketSrc;

                    // Hide the rocket after the animation
                    gameState.rocketVisible = false;

                    drawGame();
                    setTimeout(() => {
                        resetGame();
                        gameLoop();
                    }, 1000);
                    return;
                }

                // Update rocket position during launch
                const position = calculateTrajectory(gameState.launchProgress, false);
                gameState.rocketX = startX + (position.x - startX) * gameState.launchProgress;
                gameState.rocketY = startY + (position.y - startY) * gameState.launchProgress;

                drawGame();
                requestAnimationFrame(animate);
            }

            animate();
        }

        // RESET GAME
        function resetGame() {
            gameState = {
                phase: 1,
                chargeLevel: 0,
                lastValidTime: null,
                launchProgress: 0,
                returnProgress: 0,
                trajectory: [],
                flameParticles: [],
                rocketX: 0,
                rocketY: 0
            };

            // Remove the reference to 'percentage-display'
            console.log("Game state has been reset.");
        }

        function drawGame(currentAngle) {
            // Clear canvas
            ctx.fillStyle = '#0a192f'; // Medical UI dark blue
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Earth
            drawEarth();

            // Draw stars
            drawStars();

            // Draw platform
            drawPlatform();

            // Calculate rocket position and rotation
            let position = {
                x: canvas.width / 2,
                y: canvas.height * 0.8 - 30, // Position rocket above the platform
                rotation: 0
            };

            // Handle different phases
            if (gameState.phase === 2) { // Launch phase
                position = calculateTrajectory(gameState.launchProgress, false);
                hideChargeBar(); // Hide the charge bar during the animation
            } else if (gameState.phase === 3) { // Return phase
                position = calculateTrajectory(gameState.returnProgress, true);
            } else {
                showChargeBar(); // Show the charge bar during preparation
                updateChargeBar(gameState.chargeLevel); // Update the charge bar fill
                updateChargeBarPosition(position.x, position.y, currentAngle, gameState.chargeLevel); // Update position and info
                updateAngleIndicator(currentAngle); // Update the angle indicator
            }

            // Draw rocket only if visible
            if (gameState.rocketVisible) {
                drawRocket(position);
            }
        }

        // ADD THESE HELPER FUNCTIONS
        function updateFlameParticles(position) {
            // Update existing particles
            gameState.flameParticles.forEach(p => {
                p.x += p.speedX;
                p.y += 4;
                p.life -= 0.02;
            });

            // Create new particles
            gameState.flameParticles.push({
                x: position.x,
                y: position.y,
                size: 10 + Math.random() * 10,
                life: 1,
                speedX: (Math.random() - 0.5) * 3,
                color: ROCKET_PHYSICS.flameColors[Math.floor(Math.random()*3)]
            });

            // Remove expired particles
            gameState.flameParticles = gameState.flameParticles.filter(p => p.life > 0);
        }

        function calculateTrajectory(progress, isReturn) {
            const t = isReturn ? gameState.returnProgress : progress;
            const direction = isReturn ? -1 : 1;
            
            return {
                x: canvas.width/2 + (canvas.width * 0.4 * t * direction),
                y: 470 - (canvas.height * t) + (canvas.height * ROCKET_PHYSICS.parabolaHeight * t * (1 - t)),
                rotation: ROCKET_PHYSICS.maxTilt * t * (Math.PI/180) * direction
            };
        }

        if(gameState.phase === 2) { // Launch phase
            position = calculateTrajectory(gameState.launchProgress, false);
        } else if(gameState.phase === 3) { // Return phase
            position = calculateTrajectory(gameState.returnProgress, true);
        }

        function gameLoop() {
            fetch('/game-1/data')
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        if (gameState.phase === 1) {
                            updateGameState(data.current_angle);
                            drawGame(data.current_angle); // Ensure this is called
                        }
                        requestAnimationFrame(gameLoop);
                    }
                })
                .catch(console.error);
        }

        function setupMobileControls() {
            if ('ontouchstart' in window) {
                canvas.addEventListener('touchmove', handleTouch, { passive: true });
            }
        }

        function handleTouch(e) {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const touchY = touch.clientY - rect.top;

            // Convert touch position to angle or other game logic
            const angle = (touchX / canvas.width) * 180; // Example: Map X position to angle
            updateGameState(angle);
        }

        function initGame() {
            try {
                // Use the already declared canvas and ctx variables
                const canvas = document.getElementById('gameCanvas');
                const ctx = canvas.getContext('2d');

                // Mobile adjustments
                if (window.innerWidth <= 768) {
                    canvas.width = window.innerWidth * 0.95;
                    canvas.height = window.innerHeight * 0.7;
                }

                initializeStars(canvas); // Initialize stars
                setupMobileControls();
                gameLoop();
            } catch (error) {
                console.error('Init Failed:', error);
                alert('System Initialization Failed');
            }
        }

        function resizeCanvas() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // Set canvas size relative to the viewport
            canvas.width = window.innerWidth * 0.9; // 90% of the viewport width
            canvas.height = window.innerHeight * 0.8; // 80% of the viewport height

            // Redraw the game after resizing
            drawGame(0);
        }

        // Add event listener to handle resizing
        window.addEventListener('resize', resizeCanvas);

        // Call resizeCanvas on page load
        window.addEventListener('load', () => {
            resizeCanvas();
            initGame();
        });
        // START THE GAME
        window.addEventListener('load', () => {
            drawGame(0); // Initial draw
            gameLoop();
        });

        function drawEarth() {
            const earthHeight = canvas.height * 0.15; // Earth occupies 20% of the canvas height
            const earthY = canvas.height - earthHeight; // Position Earth at the bottom of the canvas

            // Draw the Earth base (rectangle)
            ctx.fillStyle = '#0077B6'; // Blue for the ocean
            ctx.fillRect(0, earthY, canvas.width, earthHeight);

            // Add green patches (landmasses)
            ctx.fillStyle = '#2A9D8F'; // Green for land

            // Left patch
            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.1, earthY + earthHeight * 0.6);
            ctx.bezierCurveTo(
                canvas.width * 0.05, earthY + earthHeight * 0.3,
                canvas.width * 0.2, earthY + earthHeight * 0.2,
                canvas.width * 0.25, earthY + earthHeight * 0.5
            );
            ctx.bezierCurveTo(
                canvas.width * 0.3, earthY + earthHeight * 0.8,
                canvas.width * 0.15, earthY + earthHeight * 0.9,
                canvas.width * 0.1, earthY + earthHeight * 0.6
            );
            ctx.closePath();
            ctx.fill();

            // Center patch (under the platform)
            const platformWidth = canvas.width / 6;
            const platformX = (canvas.width - platformWidth) / 2;
            ctx.beginPath();
            ctx.moveTo(platformX - platformWidth * 0.5, earthY + earthHeight * 0.7);
            ctx.bezierCurveTo(
                platformX - platformWidth * 0.3, earthY + earthHeight * 0.4,
                platformX + platformWidth * 0.3, earthY + earthHeight * 0.4,
                platformX + platformWidth * 0.5, earthY + earthHeight * 0.7
            );
            ctx.bezierCurveTo(
                platformX + platformWidth * 0.4, earthY + earthHeight * 0.9,
                platformX - platformWidth * 0.4, earthY + earthHeight * 0.9,
                platformX - platformWidth * 0.5, earthY + earthHeight * 0.7
            );
            ctx.closePath();
            ctx.fill();

            // Right patch
            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.8, earthY + earthHeight * 0.5);
            ctx.bezierCurveTo(
                canvas.width * 0.75, earthY + earthHeight * 0.2,
                canvas.width * 0.95, earthY + earthHeight * 0.3,
                canvas.width * 0.9, earthY + earthHeight * 0.6
            );
            ctx.bezierCurveTo(
                canvas.width * 0.85, earthY + earthHeight * 0.8,
                canvas.width * 0.75, earthY + earthHeight * 0.7,
                canvas.width * 0.8, earthY + earthHeight * 0.5
            );
            ctx.closePath();
            ctx.fill();
        }

        const angleIndicator = document.getElementById('angle-indicator');

        function updateAngleIndicator(angle) {
            angleIndicator.textContent = `Angle: ${Math.round(angle)}°`;

            // Highlight the box if the angle is in the target range
            if (angle >= ROCKET_CONFIG.targetRange.min && angle <= ROCKET_CONFIG.targetRange.max) {
                angleIndicator.classList.add('in-range');
            } else {
                angleIndicator.classList.remove('in-range');
            }
        }

        function drawRocket(position) {
            ctx.save();
            ctx.translate(position.x, position.y);
            ctx.rotate(position.rotation);

            // Draw rocket body
            const scale = 0.5; // Scale down to 50%
            const rocketWidth = rocketImg.width * scale;
            const rocketHeight = rocketImg.height * scale;

            if (rocketReady) {
                ctx.drawImage(rocketImg, -rocketWidth / 2, -rocketHeight / 2, rocketWidth, rocketHeight);
            } else {
                ctx.fillStyle = '#78909C';
                ctx.fillRect(-15, -30, 30, 60); // Body
                ctx.fillStyle = '#B0BEC5';
                ctx.fillRect(-20, 20, 40, 10); // Fins
            }

            ctx.restore();
        }

        function drawFlameEffects(position) {
            // Draw flame particles
            gameState.flameParticles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Draw flame base
            ctx.fillStyle = '#FF4500';
            ctx.save();
            ctx.translate(position.x, position.y);
            ctx.beginPath();
            ctx.ellipse(0, 30, 10, 20, 0, 0, Math.PI * 2); // Adjusted proportions
            ctx.fill();
            ctx.restore();
        }

        function closeOpeningScreen() {
            const openingScreen = document.getElementById('opening-screen');
            openingScreen.style.display = 'none';
        }

        const linearBar = document.getElementById('linear-bar');
        const cursor = document.getElementById('cursor');

            const percentage = Math.min(Math.max((currentAngle / 135) * 100, 0), 100); // Clamp between 0% and 100%
            cursor.style.left = `${percentage}%`;
        }

        // Example usage: Update the linear indicator with the current angle
        function updateAngleFromEndpoint() {

    function updateChargeBarPosition(rocketX, rocketY) {

        chargeBar.style.top = `${rocketY - 50}px`; // Align vertically with the rocket
    }

    // Function to update the charge bar's fill based on the charge level
    function updateChargeBar(percentage) {
        const chargeFill = document.getElementById('charge-bar');
        chargeFill.style.height = `${percentage * 100}%`; // Update the height based on the percentage
    }

    // Function to hide the charge bar
    function hideChargeBar() {
        const chargeBar = document.querySelector('.progress-bar');
        chargeBar.classList.add('hidden'); // Add the "hidden" class to fade it out
    }

    // Function to show the charge bar
    function showChargeBar() {
        const chargeBar = document.querySelector('.progress-bar');
        chargeBar.classList.remove('hidden'); // Remove the "hidden" class to fade it back in
    }

    // Function to calculate the rocket's trajectory during launch or return
    function calculateTrajectory(progress, isReturn) {
        const t = isReturn ? gameState.returnProgress : progress;
        const direction = isReturn ? -1 : 1;

        return {
            x: canvas.width / 2 + (canvas.width * 0.4 * t * direction),
            y: 470 - (canvas.height * t) + (canvas.height * ROCKET_PHYSICS.parabolaHeight * t * (1 - t)),
            rotation: ROCKET_PHYSICS.maxTilt * t * (Math.PI / 180) * direction
        };
    }

    // Function to trigger the rocket's launch animation
    function triggerLaunchAnimation() {
        gameState.phase = 2; // Set the game phase to "launch"
        const startTime = Date.now();

        function animate() {
            const elapsed = Date.now() - startTime;
            gameState.launchProgress = elapsed / (ROCKET_PHYSICS.launchDuration * 1000);

            if (gameState.launchProgress >= 1) {
                gameState.launchProgress = 1; // Cap the progress at 100%
                gameState.rocketVisible = false; // Hide the rocket after launch
                resetGame(); // Reset the game state
                return;
            }

            // Update the rocket's position during launch
            const position = calculateTrajectory(gameState.launchProgress, false);
            gameState.rocketX = position.x;
            gameState.rocketY = position.y;

            drawGame(); // Redraw the game
            requestAnimationFrame(animate); // Continue the animation
        }

        animate();
    }

    // Function to reset the game state
    function resetGame() {
        gameState = {
            phase: 1,
            chargeLevel: 0,
            lastValidTime: null,
            launchProgress: 0,
            returnProgress: 0,
            trajectory: [],
            flameParticles: [],
            rocketX: canvas.width / 2,
            rocketY: canvas.height * 0.8 - 30
        };
        showChargeBar(); // Show the charge bar again
    }

    // Function to draw the game
    function drawGame(currentAngle = 0) {
        // Clear the canvas
        ctx.fillStyle = '#0a192f'; // Dark blue background
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Earth
        drawEarth();

        // Draw stars
        drawStars();

        // Draw the platform
        drawPlatform();

        // Calculate the rocket's position and rotation
        let position = {
            x: canvas.width / 2,
            y: canvas.height * 0.8 - 30, // Position the rocket above the platform
            rotation: 0
        };

        if (gameState.phase === 2) { // Launch phase
            position = calculateTrajectory(gameState.launchProgress, false);
            hideChargeBar(); // Hide the charge bar during the launch
        } else if (gameState.phase === 3) { // Return phase
            position = calculateTrajectory(gameState.returnProgress, true);
        } else {
            showChargeBar(); // Show the charge bar during preparation
            updateChargeBar(gameState.chargeLevel); // Update the charge bar fill
            updateChargeBarPosition(position.x, position.y); // Update the charge bar's position
        }

        // Draw the rocket if it's visible
        if (gameState.rocketVisible) {
            drawRocket(position);
        }
    }
